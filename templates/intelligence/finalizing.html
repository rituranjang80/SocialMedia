{% extends "base.html" %}
{% block page_title %}Finalizing…{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto py-16 px-4 text-center">
  <div class="mx-auto mb-6 w-12 h-12 rounded-full border-4 border-orange-200 border-t-orange-600 animate-spin"></div>
  <h1 class="text-xl font-semibold text-stone-900 mb-2">Setting up your Intelligence access…</h1>
  <p class="text-sm text-stone-600 mb-6">
    Stripe confirmed your payment. We're finishing the handshake with the
    billing service, this usually takes a few seconds.
  </p>

  <div id="finalizing-status"
       hx-get="{% url 'intelligence_global:finalizing-status' %}"
       hx-trigger="load, every 2s"
       hx-swap="outerHTML"
       class="text-xs text-stone-400">
    Checking…
  </div>
</div>
{% endblock %}
