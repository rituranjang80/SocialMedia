<div class="mt-3 p-3 rounded border border-amber-200 bg-amber-50 text-xs text-amber-800">
  <div class="font-semibold mb-1">Out of credits</div>
  <div>Upgrade your plan or top up to keep using Intelligence.</div>
  <form method="post" action="{% url 'intelligence:portal' org_id=organization.id %}" class="mt-2">
    {% csrf_token %}
    <button type="submit"
            class="px-3 py-1 text-xs font-semibold text-white bg-amber-600 rounded-full hover:bg-amber-700 cursor-pointer">
      Manage billing →
    </button>
  </form>
</div>
