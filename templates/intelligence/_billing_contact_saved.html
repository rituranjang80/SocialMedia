<div id="billing-contact-saved" class="mt-3 min-h-[20px]">
    {% if error %}
    <div class="inline-flex items-center gap-2 px-3 py-1.5 text-xs font-medium rounded-full bg-red-50 text-red-700">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Couldn't save, billing service was unreachable. Please try again.
    </div>
    {% else %}
    <div class="inline-flex items-center gap-2 px-3 py-1.5 text-xs font-medium rounded-full bg-green-50 text-green-700">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Saved · {{ billing_email }}
    </div>
    {% endif %}
</div>
