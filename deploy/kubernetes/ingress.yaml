apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: brightbean-studio
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  rules:
    - host: brightbean.local
      http:
        paths:
          # Web UI (Django templates + HTMX)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: brightbean-app
                port:
                  number: 80
          # Agent REST API + Swagger docs (/api/v1/docs)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: brightbean-app
                port:
                  number: 80
          - path: /oauth
            pathType: Prefix
            backend:
              service:
                name: brightbean-app
                port:
                  number: 80
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: brightbean-app
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: brightbean-app
                port:
                  number: 80
