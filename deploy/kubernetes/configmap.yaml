apiVersion: v1
kind: ConfigMap
metadata:
  name: brightbean-studio-config
data:
  DJANGO_SETTINGS_MODULE: config.settings.production
  ALLOWED_HOSTS: "*"
  APP_URL: http://localhost
  STORAGE_BACKEND: local
  MULTITENANT_ENABLED: "true"
  AGENT_API_DOCS_ENABLED: "true"
  PUBLISHER_MAX_CONCURRENT_PUBLISHES: "10"
  PUBLISHER_MAX_CONCURRENT_POSTS: "4"
  GUNICORN_WORKERS: "4"
  GUNICORN_THREADS: "2"
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/brightbean
  API_CONFIG_PATH: /app/config/api_runtime.json
