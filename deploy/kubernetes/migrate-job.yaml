apiVersion: batch/v1
kind: Job
metadata:
  name: brightbean-migrate
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: brightbean-studio:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: brightbean-studio-config
            - secretRef:
                name: brightbean-studio-secrets
