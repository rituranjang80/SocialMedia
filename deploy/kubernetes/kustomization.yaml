apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: brightbean-studio

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
  - app-deployment.yaml
  - app-service.yaml
  - worker-deployment.yaml
  - ingress.yaml
  - api-configmap.yaml

commonLabels:
  app.kubernetes.io/name: brightbean-studio
  app.kubernetes.io/part-of: brightbean-studio

images:
  - name: brightbean-studio
    newName: brightbean-studio
    newTag: latest
