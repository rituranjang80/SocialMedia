apiVersion: apps/v1
kind: Deployment
metadata:
  name: brightbean-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: brightbean-studio:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "manage.py", "process_tasks"]
          envFrom:
            - configMapRef:
                name: brightbean-studio-config
            - secretRef:
                name: brightbean-studio-secrets
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: api-config
              mountPath: /app/config/api_runtime.json
              subPath: api_runtime.json
              readOnly: true
      volumes:
        - name: media
          emptyDir: {}
        - name: api-config
          configMap:
            name: brightbean-api-config
