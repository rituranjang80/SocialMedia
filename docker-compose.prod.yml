services:
  migrate:
    build: .
    command: python manage.py migrate --noinput
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/brightbean
    depends_on:
      postgres:
        condition: service_healthy

  app:
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4} --threads ${GUNICORN_THREADS:-2}
    volumes:
      - media_data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    volumes:
      - media_data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
